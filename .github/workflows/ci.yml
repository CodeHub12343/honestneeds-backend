name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run linter
        run: npm run lint
        continue-on-error: false

      - name: 🧪 Run unit tests
        run: npm run test:unit -- --coverage

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: ✅ Run integration tests
        run: npm run test:integration
        continue-on-error: false

      - name: 🏗️ Build project
        run: npm run build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔐 Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

  notify:
    needs: [lint-and-test, security-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📨 Notify if failed
        if: needs.lint-and-test.result == 'failure' || needs.security-check.result == 'failure'
        run: |
          echo "❌ CI/CD Pipeline Failed"
          exit 1

      - name: ✅ Notify if passed
        if: needs.lint-and-test.result == 'success' && needs.security-check.result == 'success'
        run: echo "✅ CI/CD Pipeline Passed"
